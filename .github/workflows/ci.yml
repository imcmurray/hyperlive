name: ci

# The repo's one novel claim is the safe-template invariant: untrusted internet
# input can mutate a LIVE DOM and never escape into script execution. This
# workflow makes that claim a regression gate — unit tests for the validation
# logic, plus an adversarial probe that fires an injection corpus at the real
# scene in a real browser. A green check here means the invariant still holds.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: unit tests (validation logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # the ingest runs on Node built-ins — nothing to install
      - run: node --test "tests/unit/*.test.js"

  adversarial:
    name: adversarial scene probe (injection corpus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # the probe loads the actual scene in headless Chromium inside the
      # streamer image and asserts no payload escapes the sandbox
      - run: tests/adversarial/run.sh
